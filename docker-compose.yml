services:
  # Infraestructura: Base de Datos Soberana
  db:
    build:
      context: .
      dockerfile_inline: |
        FROM postgres:18-alpine
        COPY database/ /docker-entrypoint-initdb.d/
    container_name: sis_uneti_db
    environment:
      POSTGRES_DB: data_soberana
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1234}
    ports:
      - "5432:5432"
    volumes:
      - E:/DockerData/sis_uneti_soberana:/var/lib/postgresql

  # Infraestructura: Mensajería Redis
  redis:
    image: redis:7-alpine
    container_name: sis_uneti_redis
    ports:
      - "6379:6379"

  # Aplicación: Backend (NestJS)
  backend:
    build:
      context: ./sis-uneti-backend
      dockerfile: backend.dockerfile
    container_name: sis_uneti_backend
    depends_on:
      - db
      - redis
    ports:
      - "3000:3000"
    env_file:
      - ./sis-uneti-backend/.env

  # Aplicación: Frontend (React)
  frontend:
    build:
      context: ./sis-uneti-frontend
      dockerfile: frontend.dockerfile
    container_name: sis_uneti_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data: